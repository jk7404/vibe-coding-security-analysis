{% extends "base.html" %}
{% block title %}Log In — PassVault{% endblock %}
{% block wrap_class %}container-sm{% endblock %}

{% block content %}
<div class="card">
  <div class="auth-title">&#128274; PassVault</div>
  <div class="auth-sub">Sign in to your vault</div>

  <form method="post" action="{{ url_for('login') }}">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username"
             placeholder="your_username" required autofocus>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             autocomplete="current-password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;">
      Log In
    </button>
  </form>

  <div class="auth-footer">
    No account? <a href="{{ url_for('register') }}">Register here</a>
  </div>
</div>
{% endblock %}
