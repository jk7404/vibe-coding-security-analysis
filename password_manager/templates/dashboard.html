{% extends "base.html" %}

{% block title %}Dashboard - Password Manager{% endblock %}

{% block content %}
<div class="dashboard">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>🔐 Vault</h2>
            <span class="user-badge">{{ session.username }}</span>
        </div>

        <div class="categories-section">
            <div class="section-title">
                <h3>Categories</h3>
                <button class="btn-add" title="Add Category" onclick="showAddCategoryModal()">+</button>
            </div>
            <div id="categoriesList" class="categories-list"></div>
        </div>

        <div class="sidebar-footer">
            <a href="{{ url_for('logout') }}" class="btn btn-secondary">Logout</a>
        </div>
    </div>

    <div class="main-content">
        <div class="header-section">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Search passwords...">
                <span class="search-icon">🔍</span>
            </div>

            <button class="btn btn-primary" onclick="showAddPasswordModal()">+ Add Password</button>
        </div>

        <div id="passwordsList" class="passwords-grid"></div>
    </div>
</div>

<!-- Add Password Modal -->
<div id="addPasswordModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Add New Password</h2>
            <button class="modal-close" onclick="closeModal('addPasswordModal')">&times;</button>
        </div>

        <form id="addPasswordForm" class="password-form">
            <div class="form-row">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="pwdTitle" required placeholder="e.g., Gmail, Netflix">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="pwdCategory">
                        <option value="">Select category</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Username/Email</label>
                    <input type="text" id="pwdUsername" placeholder="Your username or email">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="pwdEmail" placeholder="Email address">
                </div>
            </div>

            <div class="form-group">
                <label>Website/URL</label>
                <input type="url" id="pwdUrl" placeholder="https://example.com">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Password *</label>
                    <div class="password-input-group">
                        <input type="password" id="pwdPassword" required placeholder="Enter or generate password">
                        <button type="button" class="btn-generate" onclick="generateNewPassword()">Generate</button>
                    </div>
                    <div id="pwdStrength" class="strength-indicator"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea id="pwdNotes" placeholder="Additional notes" rows="3"></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('addPasswordModal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Password</button>
            </div>
        </form>
    </div>
</div>

<!-- Edit Password Modal -->
<div id="editPasswordModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Edit Password</h2>
            <button class="modal-close" onclick="closeModal('editPasswordModal')">&times;</button>
        </div>

        <form id="editPasswordForm" class="password-form">
            <input type="hidden" id="editPwdId">

            <div class="form-row">
                <div class="form-group">
                    <label>Title *</label>
                    <input type="text" id="editPwdTitle" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="editPwdCategory"></select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Username/Email</label>
                    <input type="text" id="editPwdUsername">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editPwdEmail">
                </div>
            </div>

            <div class="form-group">
                <label>Website/URL</label>
                <input type="url" id="editPwdUrl">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-input-group">
                        <input type="password" id="editPwdPassword" placeholder="Leave blank to keep current">
                        <button type="button" class="btn-generate" onclick="generateNewPassword('edit')">Generate</button>
                    </div>
                    <div id="editPwdStrength" class="strength-indicator"></div>
                </div>
            </div>

            <div class="form-group">
                <label>Notes</label>
                <textarea id="editPwdNotes" rows="3"></textarea>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-danger" onclick="deleteCurrentPassword()">Delete</button>
                <button type="button" class="btn btn-secondary" onclick="closeModal('editPasswordModal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<!-- Add Category Modal -->
<div id="addCategoryModal" class="modal" style="display: none;">
    <div class="modal-content small">
        <div class="modal-header">
            <h2>Add Category</h2>
            <button class="modal-close" onclick="closeModal('addCategoryModal')">&times;</button>
        </div>

        <form id="addCategoryForm" class="password-form">
            <div class="form-group">
                <label>Category Name *</label>
                <input type="text" id="catName" required placeholder="e.g., Shopping, Banking">
            </div>

            <div class="form-group">
                <label>Color</label>
                <div class="color-picker">
                    <input type="color" id="catColor" value="#3498db">
                </div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('addCategoryModal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Add Category</button>
            </div>
        </form>
    </div>
</div>

<!-- Password Generator Modal -->
<div id="generatorModal" class="modal" style="display: none;">
    <div class="modal-content small">
        <div class="modal-header">
            <h2>Generate Password</h2>
            <button class="modal-close" onclick="closeModal('generatorModal')">&times;</button>
        </div>

        <form id="generatorForm" class="password-form">
            <div class="form-group">
                <label>Password Length</label>
                <div class="range-input">
                    <input type="range" id="genLength" min="8" max="32" value="16">
                    <span id="lengthDisplay">16</span>
                </div>
            </div>

            <div class="form-group">
                <label>Include:</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="genUppercase" checked> Uppercase (A-Z)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="genLowercase" checked> Lowercase (a-z)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="genNumbers" checked> Numbers (0-9)
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="genSymbols" checked> Symbols (!@#$%)
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Generated Password</label>
                <div class="password-display">
                    <input type="text" id="genPassword" readonly>
                    <button type="button" class="btn-copy" onclick="copyToClipboard('genPassword')">Copy</button>
                </div>
                <div id="genStrength" class="strength-indicator"></div>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('generatorModal')">Close</button>
                <button type="button" class="btn btn-primary" onclick="useGeneratedPassword()">Use This Password</button>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
        loadCategories();
        loadPasswords();
        setupEventListeners();
    });

    function setupEventListeners() {
        document.getElementById('searchInput').addEventListener('input', () => loadPasswords());
        document.getElementById('addPasswordForm').addEventListener('submit', savePassword);
        document.getElementById('editPasswordForm').addEventListener('submit', updatePassword);
        document.getElementById('addCategoryForm').addEventListener('submit', saveCategory);
        document.getElementById('genLength').addEventListener('input', (e) => {
            document.getElementById('lengthDisplay').textContent = e.target.value;
            generatePassword();
        });
        document.getElementById('genUppercase').addEventListener('change', generatePassword);
        document.getElementById('genLowercase').addEventListener('change', generatePassword);
        document.getElementById('genNumbers').addEventListener('change', generatePassword);
        document.getElementById('genSymbols').addEventListener('change', generatePassword);

        // Password input strength indicators
        document.getElementById('pwdPassword').addEventListener('input', (e) => {
            updateStrengthIndicator(e.target.value, 'pwdStrength');
        });
        document.getElementById('editPwdPassword').addEventListener('input', (e) => {
            if (e.target.value) updateStrengthIndicator(e.target.value, 'editPwdStrength');
        });
    }

    async function loadCategories() {
        try {
            const response = await fetch('/api/categories');
            const categories = await response.json();

            const list = document.getElementById('categoriesList');
            list.innerHTML = '';

            const allBtn = document.createElement('button');
            allBtn.className = 'category-item active';
            allBtn.textContent = '📁 All Passwords';
            allBtn.onclick = () => {
                document.querySelectorAll('.category-item').forEach(b => b.classList.remove('active'));
                allBtn.classList.add('active');
                loadPasswords();
            };
            list.appendChild(allBtn);

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-item';
                btn.style.borderLeft = `4px solid ${cat.color}`;
                btn.textContent = cat.name;
                btn.onclick = () => {
                    document.querySelectorAll('.category-item').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    loadPasswords(cat.id);
                };
                list.appendChild(btn);
            });

            // Update category selects
            document.getElementById('pwdCategory').innerHTML = '<option value="">Select category</option>';
            document.getElementById('editPwdCategory').innerHTML = '';
            categories.forEach(cat => {
                const opt1 = document.createElement('option');
                opt1.value = cat.id;
                opt1.textContent = cat.name;
                document.getElementById('pwdCategory').appendChild(opt1);

                const opt2 = document.createElement('option');
                opt2.value = cat.id;
                opt2.textContent = cat.name;
                document.getElementById('editPwdCategory').appendChild(opt2);
            });
        } catch (error) {
            console.error('Error loading categories:', error);
        }
    }

    async function loadPasswords(categoryId = null) {
        try {
            let url = '/api/passwords';
            const params = new URLSearchParams();

            if (categoryId) params.append('category_id', categoryId);
            const search = document.getElementById('searchInput').value;
            if (search) params.append('search', search);

            if (params.toString()) url += '?' + params.toString();

            const response = await fetch(url);
            const passwords = await response.json();

            const list = document.getElementById('passwordsList');
            list.innerHTML = '';

            if (passwords.length === 0) {
                list.innerHTML = '<div class="empty-state">No passwords found. Add one to get started!</div>';
                return;
            }

            passwords.forEach(pwd => {
                const card = document.createElement('div');
                card.className = 'password-card';
                card.innerHTML = `
                    <div class="password-card-header">
                        <h3>${escapeHtml(pwd.title)}</h3>
                        <span class="category-badge" style="background-color: ${pwd.category_id ? '' : '#95a5a6'}">${pwd.category_name}</span>
                    </div>
                    <div class="password-card-body">
                        ${pwd.username ? `<p><strong>Username:</strong> ${escapeHtml(pwd.username)}</p>` : ''}
                        ${pwd.email ? `<p><strong>Email:</strong> ${escapeHtml(pwd.email)}</p>` : ''}
                        ${pwd.url ? `<p><strong>URL:</strong> <a href="${pwd.url}" target="_blank">${escapeHtml(pwd.url)}</a></p>` : ''}
                    </div>
                    <div class="password-card-footer">
                        <small>Updated: ${pwd.updated_at}</small>
                        <button class="btn btn-sm" onclick="editPassword(${pwd.id})">Edit</button>
                    </div>
                `;
                list.appendChild(card);
            });
        } catch (error) {
            console.error('Error loading passwords:', error);
        }
    }

    function escapeHtml(text) {
        const map = {'&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'};
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    async function savePassword(e) {
        e.preventDefault();

        const data = {
            title: document.getElementById('pwdTitle').value,
            username: document.getElementById('pwdUsername').value,
            email: document.getElementById('pwdEmail').value,
            password: document.getElementById('pwdPassword').value,
            url: document.getElementById('pwdUrl').value,
            notes: document.getElementById('pwdNotes').value,
            category_id: document.getElementById('pwdCategory').value || null
        };

        try {
            const response = await fetch('/api/password/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if (response.ok) {
                closeModal('addPasswordModal');
                document.getElementById('addPasswordForm').reset();
                loadPasswords();
            }
        } catch (error) {
            alert('Error saving password');
        }
    }

    async function editPassword(id) {
        try {
            const response = await fetch(`/api/passwords`);
            const passwords = await response.json();
            const pwd = passwords.find(p => p.id === id);

            if (pwd) {
                document.getElementById('editPwdId').value = id;
                document.getElementById('editPwdTitle').value = pwd.title;
                document.getElementById('editPwdUsername').value = pwd.username || '';
                document.getElementById('editPwdEmail').value = pwd.email || '';
                document.getElementById('editPwdUrl').value = pwd.url || '';
                document.getElementById('editPwdNotes').value = pwd.notes || '';
                document.getElementById('editPwdCategory').value = pwd.category_id || '';

                showModal('editPasswordModal');
            }
        } catch (error) {
            alert('Error loading password');
        }
    }

    async function updatePassword(e) {
        e.preventDefault();

        const id = document.getElementById('editPwdId').value;
        const data = {
            title: document.getElementById('editPwdTitle').value,
            username: document.getElementById('editPwdUsername').value,
            email: document.getElementById('editPwdEmail').value,
            password: document.getElementById('editPwdPassword').value,
            url: document.getElementById('editPwdUrl').value,
            notes: document.getElementById('editPwdNotes').value,
            category_id: document.getElementById('editPwdCategory').value || null
        };

        try {
            const response = await fetch(`/api/password/${id}/update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if (response.ok) {
                closeModal('editPasswordModal');
                loadPasswords();
            }
        } catch (error) {
            alert('Error updating password');
        }
    }

    async function deleteCurrentPassword() {
        if (!confirm('Are you sure you want to delete this password? This cannot be undone.')) return;

        const id = document.getElementById('editPwdId').value;

        try {
            const response = await fetch(`/api/password/${id}/delete`, {method: 'POST'});
            if (response.ok) {
                closeModal('editPasswordModal');
                loadPasswords();
            }
        } catch (error) {
            alert('Error deleting password');
        }
    }

    async function saveCategory(e) {
        e.preventDefault();

        const data = {
            name: document.getElementById('catName').value,
            color: document.getElementById('catColor').value
        };

        try {
            const response = await fetch('/api/category/add', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            if (response.ok) {
                closeModal('addCategoryModal');
                document.getElementById('addCategoryForm').reset();
                loadCategories();
            }
        } catch (error) {
            alert('Error adding category');
        }
    }

    async function generatePassword(source = 'add') {
        try {
            const data = {
                length: parseInt(document.getElementById('genLength').value),
                include_uppercase: document.getElementById('genUppercase').checked,
                include_lowercase: document.getElementById('genLowercase').checked,
                include_numbers: document.getElementById('genNumbers').checked,
                include_symbols: document.getElementById('genSymbols').checked
            };

            const response = await fetch('/api/generate-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });

            const result = await response.json();
            document.getElementById('genPassword').value = result.password;
            updateStrengthIndicator(result.password, 'genStrength');
        } catch (error) {
            console.error('Error generating password:', error);
        }
    }

    function generateNewPassword(source = 'add') {
        showModal('generatorModal');
        generatePassword(source);
    }

    function useGeneratedPassword() {
        const pwd = document.getElementById('genPassword').value;
        const activeModal = document.querySelector('.modal:not([style*="display: none"])');

        if (activeModal.id === 'generatorModal') {
            const source = document.querySelector('.modal:not([style*="display: none"]):not(#generatorModal)');
            if (source && source.id === 'addPasswordModal') {
                document.getElementById('pwdPassword').value = pwd;
            } else if (source && source.id === 'editPasswordModal') {
                document.getElementById('editPwdPassword').value = pwd;
            }
            closeModal('generatorModal');
        }
    }

    function updateStrengthIndicator(password, elementId) {
        const strength = {0: 'Weak', 1: 'Weak', 2: 'Fair', 3: 'Good', 4: 'Strong', 5: 'Very Strong', 6: 'Very Strong'};
        let score = 0;

        if (password.length >= 8) score++;
        if (password.length >= 12) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[a-z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^A-Za-z0-9]/.test(password)) score++;

        const colors = ['#e74c3c', '#e67e22', '#f39c12', '#f1c40f', '#2ecc71', '#27ae60'];
        const el = document.getElementById(elementId);
        el.textContent = strength[score];
        el.style.color = colors[score];
    }

    function showModal(id) {
        document.getElementById(id).style.display = 'flex';
    }

    function closeModal(id) {
        document.getElementById(id).style.display = 'none';
    }

    function showAddPasswordModal() {
        showModal('addPasswordModal');
    }

    function showAddCategoryModal() {
        showModal('addCategoryModal');
    }

    function copyToClipboard(elementId) {
        const element = document.getElementById(elementId);
        element.select();
        document.execCommand('copy');
        alert('Copied to clipboard!');
    }

    window.onclick = (event) => {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = 'none';
        }
    };
</script>
{% endblock %}
