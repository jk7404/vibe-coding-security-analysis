{% extends "base.html" %}

{% block title %}Unlock - Password Manager{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>🔓 Unlock Your Vault</h1>
            <p>Enter your master password to continue</p>
        </div>

        <form id="unlockForm" class="auth-form">
            <div class="form-group">
                <label for="master_password">Master Password</label>
                <input type="password" id="master_password" name="master_password" required placeholder="Enter your master password">
            </div>

            <button type="submit" class="btn btn-primary">Unlock</button>
        </form>

        <p class="auth-switch"><a href="{{ url_for('logout') }}">Logout</a></p>

        <div id="error" class="error-message" style="display: none;"></div>
    </div>
</div>

<script>
document.getElementById('unlockForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const errorDiv = document.getElementById('error');

    const formData = {
        master_password: document.getElementById('master_password').value
    };

    try {
        const response = await fetch('/unlock', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(formData)
        });

        const data = await response.json();

        if (data.success) {
            window.location.href = data.redirect;
        } else {
            errorDiv.textContent = data.error;
            errorDiv.style.display = 'block';
        }
    } catch (error) {
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.style.display = 'block';
    }
});
</script>
{% endblock %}
