{% extends "base.html" %}
{% block content %}
  <div class="card">
    <h1>{{ title }}</h1>
    <form method="post">
      {{ form.hidden_tag() }}
      <label>
        Service name
        {{ form.service_name(class_="input", placeholder="e.g. GitHub") }}
        {% for e in form.service_name.errors %}<div class="error">{{ e }}</div>{% endfor %}
      </label>
      <label>
        Username
        {{ form.username(class_="input", placeholder="e.g. alice") }}
        {% for e in form.username.errors %}<div class="error">{{ e }}</div>{% endfor %}
      </label>
      <label>
        Password
        {{ form.password(class_="input", id="pw") }}
        {% for e in form.password.errors %}<div class="error">{{ e }}</div>{% endfor %}
        <div class="row gap-sm">
          <button class="btn btn-ghost" type="button" onclick="togglePw()">Show/Hide</button>
          <button class="btn btn-ghost" type="button" onclick="copyPw()">Copy</button>
        </div>
      </label>
      <label>
        URL
        {{ form.url(class_="input", placeholder="https://example.com/login") }}
        {% for e in form.url.errors %}<div class="error">{{ e }}</div>{% endfor %}
      </label>
      <div class="row">
        <button class="btn" type="submit">{{ form.submit.label.text }}</button>
        <a class="btn btn-ghost" href="{{ url_for('vault') }}">Back</a>
      </div>
    </form>
  </div>

  <script>
    function togglePw() {
      const el = document.getElementById("pw");
      el.type = el.type === "password" ? "text" : "password";
    }
    async function copyPw() {
      const el = document.getElementById("pw");
      try {
        await navigator.clipboard.writeText(el.value);
      } catch (e) {
        el.select();
        document.execCommand("copy");
        el.setSelectionRange(0, 0);
      }
    }
  </script>
{% endblock %}
