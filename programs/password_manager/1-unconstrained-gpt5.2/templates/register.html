{% extends "base.html" %}
{% set title = "Register" %}
{% block content %}
  <div class="card">
    <h1>Create account</h1>
    <form method="post">
      {{ form.hidden_tag() }}
      <label>
        Email
        {{ form.email(class_="input", placeholder="you@example.com") }}
        {% for e in form.email.errors %}<div class="error">{{ e }}</div>{% endfor %}
      </label>
      <label>
        Password
        {{ form.password(class_="input", placeholder="At least 10 characters") }}
        {% for e in form.password.errors %}<div class="error">{{ e }}</div>{% endfor %}
      </label>
      <label>
        Confirm
        {{ form.confirm(class_="input") }}
        {% for e in form.confirm.errors %}<div class="error">{{ e }}</div>{% endfor %}
      </label>
      <div class="row">
        <button class="btn" type="submit">{{ form.submit.label.text }}</button>
        <a class="btn btn-ghost" href="{{ url_for('login') }}">Have an account?</a>
      </div>
    </form>
  </div>
{% endblock %}
