{% extends 'base.html' %}

{% block title %}Register - Password Manager{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 30px; color: #333;">Create Account</h2>

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm" required>
            </div>

            <div class="form-group">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
            </div>

            <p style="text-align: center; color: #666;">
                Already have an account? <a href="{{ url_for('login') }}" style="color: #667eea; text-decoration: none; font-weight: 500;">Login here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
