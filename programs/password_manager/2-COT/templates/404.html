{% extends 'base.html' %}

{% block title %}404 - Not Found{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-1">
        <i class="bi bi-exclamation-triangle text-warning"></i> 404
    </h1>
    <h2>Page Not Found</h2>
    <p class="text-muted mb-4">The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('dashboard') if 'user_id' in session else url_for('login') }}" class="btn btn-primary">
        <i class="bi bi-house"></i> Go to {% if 'user_id' in session %}Dashboard{% else %}Login{% endif %}
    </a>
</div>
{% endblock %}
