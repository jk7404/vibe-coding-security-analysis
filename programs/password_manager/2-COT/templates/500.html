{% extends 'base.html' %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-1">
        <i class="bi bi-exclamation-circle text-danger"></i> 500
    </h1>
    <h2>Server Error</h2>
    <p class="text-muted mb-4">Something went wrong on our end. Please try again later.</p>
    <a href="{{ url_for('dashboard') if 'user_id' in session else url_for('login') }}" class="btn btn-primary">
        <i class="bi bi-house"></i> Go to {% if 'user_id' in session %}Dashboard{% else %}Login{% endif %}
    </a>
</div>
{% endblock %}
