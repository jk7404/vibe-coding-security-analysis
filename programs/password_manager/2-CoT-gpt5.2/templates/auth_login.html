{% extends "base.html" %}
{% set title = "Login" %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Log in</h1>
          <form method="post" action="{{ url_for('login_post') }}">
            <input type="hidden" name="csrf_token" value="{{ g.csrf_token }}" />
            <div class="mb-3">
              <label class="form-label">Username or email</label>
              <input class="form-control" name="identifier" autocomplete="username" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Master password</label>
              <input class="form-control" type="password" name="password" autocomplete="current-password" required />
              <div class="form-text">Used to decrypt your saved passwords on this server.</div>
            </div>
            <button class="btn btn-primary w-100" type="submit">Log in</button>
          </form>
          <div class="mt-3 text-center">
            <a href="{{ url_for('register') }}">Create an account</a>
          </div>
        </div>
      </div>
      <div class="text-secondary small mt-3">
        Tip: run behind HTTPS (reverse proxy) if this is accessible over a network.
      </div>
    </div>
  </div>
{% endblock %}
