{% extends "base.html" %}
{% set title = "Register" %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-6 col-lg-5">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Create account</h1>
          <form method="post" action="{{ url_for('register_post') }}">
            <input type="hidden" name="csrf_token" value="{{ g.csrf_token }}" />
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input class="form-control" name="username" autocomplete="username" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" name="email" autocomplete="email" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Master password</label>
              <input class="form-control" type="password" name="password" autocomplete="new-password" required />
              <div class="form-text">Choose a strong password. There is no recovery in this demo.</div>
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm password</label>
              <input class="form-control" type="password" name="password2" autocomplete="new-password" required />
            </div>
            <button class="btn btn-primary w-100" type="submit">Create account</button>
          </form>
          <div class="mt-3 text-center">
            <a href="{{ url_for('login') }}">Back to login</a>
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
