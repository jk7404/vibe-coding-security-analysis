{% extends "base.html" %}
{% set title = "New" if mode == "new" else "Edit" %}

{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="h4 m-0">{{ "Add credential" if mode == "new" else "Edit credential" }}</h1>
            <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('vault') }}">Back</a>
          </div>

          {% if mode == "new" %}
            <form method="post" action="{{ url_for('credential_new_post') }}">
          {% else %}
            <form method="post" action="{{ url_for('credential_edit_post', cred_id=cred.id) }}">
          {% endif %}
              <input type="hidden" name="csrf_token" value="{{ g.csrf_token }}" />

              <div class="mb-3">
                <label class="form-label">Service name</label>
                <input class="form-control" name="service_name" value="{{ cred.service_name if cred else '' }}" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Username</label>
                <input class="form-control" name="login_username" value="{{ cred.login_username if cred else '' }}" required />
              </div>

              <div class="mb-3">
                <label class="form-label">Password{% if mode == "edit" %} (leave blank to keep){% endif %}</label>
                <input class="form-control" type="password" name="password" {% if mode == "new" %}required{% endif %} />
              </div>

              <div class="mb-3">
                <label class="form-label">URL (optional)</label>
                <input class="form-control" name="url" value="{{ cred.url if (cred and cred.url) else '' }}" placeholder="https://..." />
              </div>

              <button class="btn btn-primary" type="submit">{{ "Save" if mode == "new" else "Update" }}</button>
            </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
