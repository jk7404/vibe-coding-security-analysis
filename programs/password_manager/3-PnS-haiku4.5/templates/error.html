{% extends "base.html" %}

{% block title %}Error {{ error_code }} - Password Manager{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 3rem auto; text-align: center;">
    <h2 style="color: #dc3545; margin-bottom: 1rem; font-size: 3rem;">{{ error_code }}</h2>

    <p style="color: #666; font-size: 1.2rem; margin-bottom: 2rem;">
        {{ error_message }}
    </p>

    <a href="{{ url_for('dashboard') if session.user_id else url_for('login') }}" class="btn btn-primary">
        {% if session.user_id %}
            Go to Dashboard
        {% else %}
            Go to Login
        {% endif %}
    </a>
</div>
{% endblock %}
