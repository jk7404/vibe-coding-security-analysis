{% extends "base.html" %}
{% block title %}{{ "Edit" if action == "edit" else "New" }} Credential — PassVault{% endblock %}

{% block content %}
<div style="max-width:560px;margin:0 auto;">
  <div class="page-header">
    <h1>{{ "&#9998; Edit" if action == "edit" else "&#43; New" }} Credential</h1>
    <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">&#8592; Back</a>
  </div>

  <div class="card">
    <form method="post"
          action="{{ url_for('edit_credential', cred_id=cred_id) if action == 'edit' else url_for('new_credential') }}">
      <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

      <div class="form-group">
        <label for="service_name">Service Name <span style="color:var(--danger)">*</span></label>
        <input type="text" id="service_name" name="service_name"
               value="{{ data.get('service_name', '') }}"
               placeholder="e.g. GitHub, Netflix, Gmail" required autofocus>
      </div>

      <div class="form-group">
        <label for="username">Username / Email <span style="color:var(--danger)">*</span></label>
        <input type="text" id="username" name="username"
               value="{{ data.get('username', '') }}"
               placeholder="your_username@example.com" required autocomplete="off">
      </div>

      <div class="form-group">
        <label for="password">Password <span style="color:var(--danger)">*</span></label>
        <div style="display:flex;gap:0.5rem;align-items:center;">
          <input type="password" id="password" name="password"
                 value="{{ data.get('password', '') }}"
                 placeholder="••••••••" required autocomplete="new-password"
                 style="flex:1;">
          <button type="button" class="btn btn-ghost btn-sm" onclick="toggleNewPw()"
                  id="pw-vis-btn" title="Show/hide password">&#128065;</button>
          <button type="button" class="btn btn-ghost btn-sm" onclick="generatePw()"
                  title="Generate strong password">&#127922;</button>
        </div>
        <div id="pw-strength" style="font-size:0.78rem;margin-top:0.3rem;color:var(--muted);"></div>
      </div>

      <div class="form-group">
        <label for="url">URL <span style="color:var(--muted)">(optional)</span></label>
        <input type="url" id="url" name="url"
               value="{{ data.get('url', '') }}"
               placeholder="https://example.com">
      </div>

      <div class="form-group">
        <label for="notes">Notes <span style="color:var(--muted)">(optional)</span></label>
        <textarea id="notes" name="notes" placeholder="Any extra info…">{{ data.get('notes', '') }}</textarea>
      </div>

      <div style="display:flex;gap:0.75rem;margin-top:0.5rem;">
        <button type="submit" class="btn btn-primary">
          {{ "&#10003; Save Changes" if action == "edit" else "&#128274; Save Password" }}
        </button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script>
  const pwInput = document.getElementById('password');

  function toggleNewPw() {
    const btn = document.getElementById('pw-vis-btn');
    if (pwInput.type === 'password') {
      pwInput.type = 'text';
      btn.textContent = '🙈';
    } else {
      pwInput.type = 'password';
      btn.textContent = '👁';
    }
  }

  function generatePw() {
    const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*()-_=+';
    const arr = new Uint8Array(20);
    crypto.getRandomValues(arr);
    pwInput.value = Array.from(arr, b => chars[b % chars.length]).join('');
    pwInput.type = 'text';
    document.getElementById('pw-vis-btn').textContent = '🙈';
    checkStrength();
  }

  function checkStrength() {
    const v = pwInput.value;
    const bar = document.getElementById('pw-strength');
    if (!v) { bar.textContent = ''; return; }
    let score = 0;
    if (v.length >= 8)  score++;
    if (v.length >= 14) score++;
    if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
    if (/\d/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very strong'];
    const colors = ['', '#e05252', '#f5a623', '#f5e623', '#3ddc84', '#4ecca3'];
    bar.textContent = '⬤ ' + (labels[score] || 'Weak');
    bar.style.color = colors[score] || colors[1];
  }

  pwInput.addEventListener('input', checkStrength);
  checkStrength();
</script>
{% endblock %}
