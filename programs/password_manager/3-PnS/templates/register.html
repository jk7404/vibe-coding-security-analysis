{% extends "base.html" %}
{% block title %}Register — PassVault{% endblock %}
{% block wrap_class %}container-sm{% endblock %}

{% block content %}
<div class="card">
  <div class="auth-title">Create Account</div>
  <div class="auth-sub">Join PassVault — your passwords stay on your server</div>

  <form method="post" action="{{ url_for('register') }}">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username"
             placeholder="choose_a_username" required autofocus>
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" autocomplete="email"
             placeholder="you@example.com" required>
    </div>

    <div class="form-group">
      <label for="password">Password <span style="color:var(--muted)">(min 8 chars)</span></label>
      <input type="password" id="password" name="password"
             autocomplete="new-password" placeholder="••••••••" required minlength="8">
    </div>

    <div class="form-group">
      <label for="confirm_password">Confirm Password</label>
      <input type="password" id="confirm_password" name="confirm_password"
             autocomplete="new-password" placeholder="••••••••" required>
    </div>

    <button type="submit" class="btn btn-success" style="width:100%;justify-content:center;margin-top:0.5rem;">
      Create Account
    </button>
  </form>

  <div class="auth-footer">
    Already have an account? <a href="{{ url_for('login') }}">Log in</a>
  </div>
</div>
{% endblock %}
