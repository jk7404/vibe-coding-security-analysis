{% extends "base.html" %}

{% block title %}Add Password - Password Manager{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Add New Password</h2>
    <form method="POST">
        <div class="form-group">
            <label for="service">Service Name *</label>
            <input type="text" id="service" name="service" required placeholder="e.g., Gmail, GitHub, Twitter">
        </div>
        <div class="form-group">
            <label for="username">Username/Email *</label>
            <input type="text" id="username" name="username" required placeholder="e.g., user@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="url">Website URL (optional)</label>
            <input type="url" id="url" name="url" placeholder="e.g., https://gmail.com">
        </div>
        <button type="submit" class="btn" style="width: 100%;">Save Password</button>
        <a href="{{ url_for('dashboard') }}" class="btn btn-secondary" style="width: 100%; margin-top: 0.5rem; text-align: center;">Cancel</a>
    </form>
</div>
{% endblock %}
