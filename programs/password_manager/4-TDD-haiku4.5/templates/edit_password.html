{% extends "base.html" %}

{% block title %}Edit Password - Password Manager{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 0 auto;">
    <h2>Edit Password - {{ password.service }}</h2>
    <form method="POST">
        <div class="form-group">
            <label for="service">Service Name *</label>
            <input type="text" id="service" name="service" value="{{ password.service }}" required>
        </div>
        <div class="form-group">
            <label for="username">Username/Email *</label>
            <input type="text" id="username" name="username" value="{{ password.username }}" required>
        </div>
        <div class="form-group">
            <label for="password">Password *</label>
            <input type="password" id="password" name="password" value="{{ password.password }}" required>
        </div>
        <div class="form-group">
            <label for="url">Website URL (optional)</label>
            <input type="url" id="url" name="url" value="{{ password.url or '' }}">
        </div>
        <button type="submit" class="btn" style="width: 100%;">Update Password</button>
        <a href="{{ url_for('view_password', pwd_id=password.id) }}" class="btn btn-secondary" style="width: 100%; margin-top: 0.5rem; text-align: center;">Cancel</a>
    </form>
</div>
{% endblock %}
