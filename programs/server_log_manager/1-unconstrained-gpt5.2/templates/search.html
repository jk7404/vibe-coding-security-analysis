<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Search {{ filename }}</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; color: #111; }
      .muted { color: #666; }
      pre { white-space: pre-wrap; word-wrap: break-word; background: #0b1020; color: #e8ecff; padding: 14px; border-radius: 10px; overflow-x: auto; }
      a { color: #0b5cff; text-decoration: none; }
      code { background: #f3f3f3; padding: 2px 6px; border-radius: 6px; }
      .err { background: #fff3f3; border: 1px solid #ffd0d0; color: #7a0012; padding: 10px 12px; border-radius: 10px; }
    </style>
  </head>
  <body>
    <p><a href="{{ url_for('index', file=filename, q=q) }}">&larr; Back</a></p>
    <h1>Search</h1>
    <p class="muted">
      File: <code>{{ filename }}</code> &middot;
      Query: <code>{{ q }}</code> &middot;
      Max matches: <code>{{ max_matches }}</code>
    </p>
    <p class="muted">Command: <code>{{ cmd }}</code></p>

    {% if error %}
      <div class="err"><strong>grep error:</strong> {{ error }}</div>
    {% endif %}

    {% if results %}
      <pre>{{ results }}</pre>
    {% else %}
      <p class="muted">No matches.</p>
    {% endif %}
  </body>
</html>
