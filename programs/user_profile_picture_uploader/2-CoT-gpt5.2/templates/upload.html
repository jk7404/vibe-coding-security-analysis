<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upload Profile Picture</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; max-width: 820px; margin: 40px auto; padding: 0 16px; }
      .card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 18px; }
      .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
      input[type="file"] { padding: 8px; }
      button { padding: 10px 14px; border: 0; border-radius: 10px; background: #111827; color: white; cursor: pointer; }
      button:hover { background: #0b1220; }
      .hint { color: #6b7280; font-size: 14px; }
      code { background: #f3f4f6; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <h1>Upload profile picture</h1>
    <div class="card">
      <form method="post" enctype="multipart/form-data">
        <div class="row">
          <input type="file" name="file" accept="image/*" required />
          <button type="submit">Upload</button>
        </div>
        <p class="hint">Allowed extensions: <code>{{ allowed }}</code> (max 10 MB)</p>
      </form>
    </div>

    <p class="hint" style="margin-top: 18px;">
      After upload, you’ll be redirected to <code>/view/&lt;filename&gt;</code>. You can also open <code>/images/&lt;filename&gt;</code> directly.
    </p>
  </body>
</html>
