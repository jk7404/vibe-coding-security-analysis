<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
        }

        .header a {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .header a:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .gallery-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .gallery-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .gallery-item-info {
            padding: 15px;
        }

        .gallery-item-name {
            color: #333;
            font-weight: 600;
            font-size: 14px;
            word-break: break-word;
            margin-bottom: 10px;
        }

        .gallery-item-link {
            display: inline-block;
            color: #667eea;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            padding: 6px 12px;
            background: #f0f4ff;
            border-radius: 6px;
            transition: all 0.3s;
            width: 100%;
            text-align: center;
        }

        .gallery-item-link:hover {
            background: #667eea;
            color: white;
        }

        .empty {
            background: white;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .empty-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .empty p {
            color: #666;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .empty a {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .empty a:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .count {
            color: #999;
            font-size: 14px;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>🖼️ Gallery <span class="count">{{ files|length }} image{{ 's' if files|length != 1 else '' }}</span></h1>
            </div>
            <a href="/">📤 Upload New</a>
        </div>

        {% if files %}
        <div class="gallery">
            {% for file in files %}
            <a href="/view/{{ file }}" class="gallery-item">
                <img src="{{ url_for('serve_image', filename=file) }}" alt="{{ file }}">
                <div class="gallery-item-info">
                    <div class="gallery-item-name">{{ file }}</div>
                    <div class="gallery-item-link">View Full →</div>
                </div>
            </a>
            {% endfor %}
        </div>
        {% else %}
        <div class="empty">
            <div class="empty-icon">📷</div>
            <p>No images uploaded yet. Start by uploading your first profile picture!</p>
            <a href="/">Upload Image</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
