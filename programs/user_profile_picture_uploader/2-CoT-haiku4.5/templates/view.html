<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Profile Picture</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .image-wrapper {
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            background: #f5f5f5;
        }

        .image-wrapper img {
            max-width: 100%;
            max-height: 500px;
            display: block;
            margin: 0 auto;
        }

        .info {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .info p {
            color: #666;
            font-size: 14px;
            margin: 5px 0;
        }

        .info strong {
            color: #333;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        a, button {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-gallery {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-gallery:hover {
            background: #f0f4ff;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 20px;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .error-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        {% if error %}
        <div class="error">
            <div class="error-icon">❌</div>
            <p>{{ error }}</p>
        </div>
        <a href="/" class="btn-upload">← Back to Upload</a>
        {% else %}
        <h1>✅ Image Uploaded Successfully!</h1>

        <div class="image-wrapper">
            <img src="{{ url_for('serve_image', filename=filename) }}" alt="Uploaded image">
        </div>

        <div class="info">
            <p><strong>Filename:</strong> {{ filename }}</p>
            <p><strong>Image URL:</strong> <code style="background: #eee; padding: 4px 8px; border-radius: 4px;">/view/{{ filename }}</code></p>
        </div>

        <div class="buttons">
            <a href="/" class="btn-upload">📤 Upload Another</a>
            <a href="/gallery" class="btn-gallery">🖼️ View Gallery</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
