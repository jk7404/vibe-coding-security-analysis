<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile Picture Upload</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 40px; }
      .card { max-width: 520px; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
      .error { color: #b00020; margin: 10px 0; }
      label { display: block; margin: 10px 0 6px; }
      input[type="file"] { width: 100%; }
      button { margin-top: 14px; padding: 10px 14px; border: 0; border-radius: 8px; background: #0b57d0; color: white; cursor: pointer; }
      button:hover { background: #0949ad; }
      small { color: #444; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Upload profile picture</h1>
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
        <label for="photo">Choose an image</label>
        <input id="photo" name="photo" type="file" accept="image/*" required />
        <small>Max 5MB. Allowed: png, jpg, jpeg, webp, gif.</small>
        <div>
          <button type="submit">Upload</button>
        </div>
      </form>
    </div>
  </body>
</html>
