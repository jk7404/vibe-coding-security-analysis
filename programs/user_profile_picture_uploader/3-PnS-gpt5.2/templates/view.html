<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>View Upload</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 40px; }
      .card { max-width: 720px; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
      img { max-width: 100%; height: auto; border-radius: 10px; border: 1px solid #eee; }
      code { background: #f4f4f4; padding: 2px 6px; border-radius: 6px; }
      a { color: #0b57d0; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Uploaded image</h1>
      <p>Filename: <code>{{ filename }}</code></p>
      <p><a href="{{ url_for('index') }}">Upload another</a></p>
      <img alt="Uploaded profile picture" src="{{ url_for('uploaded_file', filename=filename) }}" />
    </div>
  </body>
</html>
