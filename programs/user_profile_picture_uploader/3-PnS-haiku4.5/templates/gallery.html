<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Profile Pictures</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            color: #333;
            font-size: 28px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .image-wrapper {
            width: 100%;
            height: 280px;
            background: #f0f0f0;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-info {
            padding: 15px;
            background: white;
        }

        .image-name {
            color: #333;
            font-weight: 500;
            font-size: 14px;
            word-break: break-all;
            margin-bottom: 10px;
        }

        .image-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn-view {
            background: #667eea;
            color: white;
        }

        .action-btn-view:hover {
            background: #764ba2;
        }

        .action-btn-copy {
            background: #f0f0f0;
            color: #333;
        }

        .action-btn-copy:hover {
            background: #e0e0e0;
        }

        .empty-state {
            background: white;
            border-radius: 12px;
            padding: 60px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-title {
            color: #333;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .empty-text {
            color: #999;
            margin-bottom: 30px;
        }

        .alert {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: none;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }

            .gallery {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            }

            .image-wrapper {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ Gallery</h1>
            <a href="/" class="btn btn-primary">Upload New</a>
        </div>

        {% if error %}
        <div class="alert alert-error">
            Error loading gallery: {{ error }}
        </div>
        {% endif %}

        {% if files %}
        <div class="gallery">
            {% for file in files %}
            <div class="gallery-item">
                <div class="image-wrapper">
                    <img src="/view/{{ file }}" alt="Profile picture" onerror="this.style.display='none'">
                </div>
                <div class="image-info">
                    <div class="image-name" title="{{ file }}">{{ file[:20] }}...</div>
                    <div class="image-actions">
                        <button class="action-btn action-btn-view" onclick="viewImage('{{ file }}')">View</button>
                        <button class="action-btn action-btn-copy" onclick="copyLink('{{ file }}')">Copy Link</button>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="empty-state">
            <div class="empty-icon">📭</div>
            <div class="empty-title">No images yet</div>
            <div class="empty-text">Upload your first profile picture to get started</div>
            <a href="/" class="btn btn-primary">Go to Upload</a>
        </div>
        {% endif %}
    </div>

    <script>
        function viewImage(filename) {
            window.open(`/view/${filename}`, '_blank');
        }

        function copyLink(filename) {
            const link = `${window.location.origin}/view/${filename}`;
            navigator.clipboard.writeText(link).then(() => {
                alert('Link copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy link');
            });
        }
    </script>
</body>
</html>
