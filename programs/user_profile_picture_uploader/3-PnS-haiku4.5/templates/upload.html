<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Picture Upload</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }

        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .upload-text {
            color: #333;
            font-weight: 500;
            margin-bottom: 5px;
        }

        .upload-hint {
            color: #999;
            font-size: 12px;
        }

        #fileInput {
            display: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
            display: block;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
            display: block;
        }

        .file-preview {
            margin-top: 20px;
            text-align: center;
        }

        .file-preview img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .file-info {
            font-size: 12px;
            color: #666;
            margin-bottom: 15px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #eee;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .link-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            text-align: center;
        }

        .link-section a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .link-section a:hover {
            color: #764ba2;
        }

        .copy-btn {
            display: inline-block;
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 4px;
            margin-left: 8px;
            cursor: pointer;
            font-size: 12px;
        }

        .copy-btn:hover {
            background: #e0e0e0;
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Profile Picture</h1>
        <p class="subtitle">Upload your profile picture (JPG, PNG, GIF, WebP - Max 5MB)</p>

        <div id="alertError" class="alert alert-error"></div>
        <div id="alertSuccess" class="alert alert-success"></div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="spinner"></div>

        <form id="uploadForm">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">⬆️</div>
                <div class="upload-text">Click to upload or drag & drop</div>
                <div class="upload-hint">JPG, PNG, GIF, WebP (Max 5MB)</div>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div class="file-preview" id="filePreview" style="display: none;">
                <img id="previewImg" src="" alt="Preview">
                <div class="file-info" id="fileInfo"></div>
            </div>

            <div class="button-group">
                <button type="button" class="btn-secondary" id="selectBtn">Select File</button>
                <button type="submit" class="btn-primary" id="uploadBtn" disabled>Upload</button>
            </div>

            <div class="link-section">
                <a href="/gallery">View Gallery</a>
            </div>
        </form>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadForm = document.getElementById('uploadForm');
        const selectBtn = document.getElementById('selectBtn');
        const uploadBtn = document.getElementById('uploadBtn');
        const alertError = document.getElementById('alertError');
        const alertSuccess = document.getElementById('alertSuccess');
        const filePreview = document.getElementById('filePreview');
        const previewImg = document.getElementById('previewImg');
        const fileInfo = document.getElementById('fileInfo');
        const progressBar = document.querySelector('.progress-bar');
        const progressFill = document.querySelector('.progress-fill');
        const spinner = document.querySelector('.spinner');

        selectBtn.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                handleFileSelect();
            }
        });

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            const file = fileInput.files[0];
            if (!file) return;

            // Validate file type
            if (!file.type.startsWith('image/')) {
                showError('Please select a valid image file');
                fileInput.value = '';
                return;
            }

            // Validate file size
            const maxSize = 5 * 1024 * 1024;
            if (file.size > maxSize) {
                showError('File exceeds 5MB limit');
                fileInput.value = '';
                return;
            }

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                fileInfo.textContent = `${file.name} (${(file.size / 1024).toFixed(1)}KB)`;
                filePreview.style.display = 'block';
                uploadBtn.disabled = false;
                clearAlerts();
            };
            reader.readAsDataURL(file);
        }

        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const file = fileInput.files[0];
            if (!file) {
                showError('Please select a file');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            uploadBtn.disabled = true;
            spinner.style.display = 'block';
            progressBar.style.display = 'block';
            progressFill.style.width = '0%';

            try {
                const xhr = new XMLHttpRequest();

                xhr.upload.addEventListener('progress', (e) => {
                    if (e.lengthComputable) {
                        const percentComplete = (e.loaded / e.total) * 100;
                        progressFill.style.width = percentComplete + '%';
                    }
                });

                xhr.addEventListener('load', () => {
                    spinner.style.display = 'none';
                    progressFill.style.width = '0%';

                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        const viewUrl = `/view/${response.filename}`;
                        showSuccess(`✓ Upload successful!<br><a href="${viewUrl}" target="_blank" style="color: inherit; text-decoration: underline;">View image</a>`);
                        fileInput.value = '';
                        filePreview.style.display = 'none';
                        uploadBtn.disabled = true;
                    } else {
                        const error = JSON.parse(xhr.responseText);
                        showError(error.error || 'Upload failed');
                        uploadBtn.disabled = false;
                    }
                });

                xhr.addEventListener('error', () => {
                    spinner.style.display = 'none';
                    showError('Network error during upload');
                    uploadBtn.disabled = false;
                });

                xhr.open('POST', '/upload');
                xhr.send(formData);
            } catch (error) {
                spinner.style.display = 'none';
                showError('Upload failed: ' + error.message);
                uploadBtn.disabled = false;
            }
        });

        function showError(message) {
            alertError.innerHTML = message;
            alertError.style.display = 'block';
            alertSuccess.style.display = 'none';
        }

        function showSuccess(message) {
            alertSuccess.innerHTML = message;
            alertSuccess.style.display = 'block';
            alertError.style.display = 'none';
        }

        function clearAlerts() {
            alertError.style.display = 'none';
            alertSuccess.style.display = 'none';
        }
    </script>
</body>
</html>
